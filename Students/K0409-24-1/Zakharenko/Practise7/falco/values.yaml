    max_mb: 100
    watch_freq_sec: 1
  output_timeout: 2000
  outputs:
    max_burst: 1000
    rate: 1
  plugins:
  - init_config: null
    library_path: libk8saudit.so
    name: k8saudit
    open_params: http://:9765/k8s-audit
  - library_path: libcloudtrail.so
    name: cloudtrail
  - init_config: ""
    library_path: libjson.so
    name: json
  priority: debug
  program_output:
    enabled: false
    keep_alive: false
    program: 'jq ''{text: .output}'' | curl -d @- -X POST https://hooks.slack.com/services/XXX'
  rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml
  - /etc/falco/rules.d
  stdout_output:
    enabled: true
  syscall_event_drops:
    actions:
    - log
    - alert
    max_burst: 1
    rate: 0.03333
    threshold: 0.1
  syscall_event_timeouts:
    max_consecutives: 1000
  syslog_output:
    enabled: true
  time_format_iso_8601: false
  watch_config_files: true
  webserver:
    enabled: true
    k8s_healthz_endpoint: /healthz
    listen_port: 8765
    ssl_certificate: /etc/falco/falco.pem
    ssl_enabled: false
