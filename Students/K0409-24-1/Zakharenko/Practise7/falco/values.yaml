  file_output:
    enabled: false
    filename: ./events.txt
    keep_alive: false
  grpc:
    bind_address: unix:///var/run/falco/falco.sock
    enabled: false
    threadiness: 0
  grpc_output:
    enabled: false
  http_output:
    enabled: true
    url: http://falco-falcosidekick:2801
